apiVersion: apps/v1
kind: Deployment
metadata:
  name: medical-service
  namespace: patch-pet
  labels:
    app: medical-service
    app.kubernetes.io/name: medical-service
    app.kubernetes.io/part-of: patch-pet
spec:
  replicas: 2
  selector:
    matchLabels:
      app: medical-service
  template:
    metadata:
      labels:
        app: medical-service
    spec:
      containers:
        - name: medical-service
          image: patch-pet/medical-service:latest
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: APP_ENV
              value: "production"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
