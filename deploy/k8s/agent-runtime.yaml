apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-runtime
  namespace: patch-pet
  labels:
    app: agent-runtime
    app.kubernetes.io/name: agent-runtime
    app.kubernetes.io/part-of: patch-pet
spec:
  replicas: 2
  selector:
    matchLabels:
      app: agent-runtime
  template:
    metadata:
      labels:
        app: agent-runtime
    spec:
      containers:
        - name: agent-runtime
          image: patch-pet/agent-runtime:latest
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: APP_ENV
              value: "production"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
